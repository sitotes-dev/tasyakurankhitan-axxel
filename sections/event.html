<!-- Event Section -->
<section class="py-section bg-cream overflow-hidden" id="event">
    <div class="container">
        <div class="text-center mb-5" data-aos="fade-up">
            <span class="text-primary fw-bold tracking-widest small mb-2 d-block">WHEN & WHERE</span>
            <h2 class="section-title">Save The Date</h2>
            <div class="title-divider"></div>
        </div>

        <!-- Countdown -->
        <div class="row justify-content-center mb-5 g-2 g-md-4">
            <div class="col-3 col-lg-2" data-aos="fade-up" data-aos-delay="100">
                <div class="timer-box-premium">
                    <span id="days">00</span>
                    <p>DAYS</p>
                </div>
            </div>
            <div class="col-3 col-lg-2" data-aos="fade-up" data-aos-delay="200">
                <div class="timer-box-premium">
                    <span id="hours">00</span>
                    <p>HOURS</p>
                </div>
            </div>
            <div class="col-3 col-lg-2" data-aos="fade-up" data-aos-delay="300">
                <div class="timer-box-premium">
                    <span id="minutes">00</span>
                    <p>MINS</p>
                </div>
            </div>
            <div class="col-3 col-lg-2" data-aos="fade-up" data-aos-delay="400">
                <div class="timer-box-premium">
                    <span id="seconds">00</span>
                    <p>SECS</p>
                </div>
            </div>
        </div>

        <!-- Premium Event Card -->
        <div class="row justify-content-center">
            <div class="col-lg-11 col-xl-10">
                <div class="event-master-card premium-shadow" data-gsap-reveal data-tilt data-tilt-max="5">                    <div class="row g-0">
                        <!-- Image Side -->
                        <div class="col-md-5 d-none d-md-block">
                            <div class="event-visual-side">
                                <div class="visual-overlay"></div>
                                <div class="visual-content text-white text-center p-4">
                                    <h4 class="script-font display-3 mb-0">Tasyakuran</h4>
                                    <p class="letter-spacing-2 opacity-75">KHITANAN</p>
                                </div>
                            </div>
                        </div>
                        <!-- Content Side -->
                        <div class="col-md-7">
                            <div class="event-details-side p-4 p-md-5 bg-white h-100">
                                
                                <!-- Date Box -->
                                <div class="event-date-row mb-5" data-aos="fade-left">
                                    <div class="d-flex align-items-center gap-3 gap-md-4">
                                        <div class="date-number-box">
                                            <span class="day-name">SABTU</span>
                                            <span class="date-num">30</span>
                                            <span class="month-year text-nowrap">MEI 2026</span>
                                        </div>
                                        <div class="date-divider"></div>
                                        <div class="time-info">
                                            <h5 class="fw-bold text-primary mb-1 small">WAKTU ACARA</h5>
                                            <p class="mb-0 text-dark opacity-75 h6">08:00 WIB - Selesai</p>
                                        </div>
                                    </div>
                                </div>

                                <div class="event-info-group">
                                    <!-- Location -->
                                    <div class="info-item d-flex align-items-start gap-3 mb-4" data-aos="fade-up" data-aos-delay="200">
                                        <div class="info-icon">
                                            <i class="fas fa-house-chimney"></i>
                                        </div>
                                        <div class="info-text">
                                            <h6 class="fw-bold mb-1 small">KEDIAMAN KELUARGA</h6>
                                            <p class="mb-0 text-dark opacity-75">Bapak Budi Susanto & Ibu Eriyanin</p>
                                        </div>
                                    </div>

                                    <div class="info-item d-flex align-items-start gap-3 mb-4" data-aos="fade-up" data-aos-delay="300">
                                        <div class="info-icon">
                                            <i class="fas fa-map-location-dot"></i>
                                        </div>
                                        <div class="info-text">
                                            <h6 class="fw-bold mb-1 small text-uppercase letter-spacing-1">LOKASI ACARA</h6>
                                            <p class="mb-3 text-muted small lh-base">Jl. Pahlawan Trip RT.07 RW.01 Jatikerto, Kab. Malang</p>
                                            
                                            <!-- Live Minimap -->
                                            <div class="minimap-wrapper mb-4" data-aos="zoom-in" data-aos-delay="400">
                                                <iframe 
                                                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3949.336440810141!2d112.5186408!3d-8.1687841!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e78bc032c529d89%3A0x6b1070d5c0b11562!2sJatikerto%2C%20Kromengan%2C%20Malang%20Regency%2C%20East%20Java!5e0!3m2!1sen!2sid!4v1700000000000!5m2!1sen!2sid" 
                                                    width="100%" height="200" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                                                </iframe>
                                            </div>

                                            <!-- Button -->
                                            <div class="text-center text-md-start">
                                                <a href="https://maps.google.com" target="_blank" class="btn-premium-action w-100 w-md-auto">
                                                    <span>BUKA DI APLIKASI MAPS</span>
                                                    <i class="fas fa-location-arrow ms-2"></i>
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
